<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>귀염뽀짝 월드 🐰</title>

<style>

body{
margin:0;
overflow:hidden;
height:100vh;
background:linear-gradient(180deg,#ffddee,#fff5fa);
font-family:Arial;
}

/* 카드 */

.card{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:40px;
border-radius:30px;
text-align:center;
width:320px;
box-shadow:0 20px 40px rgba(255,150,180,0.3);
z-index:5;
}

.title{
font-size:28px;
color:#ff6fa5;
font-weight:bold;
}

.subtitle{
color:#777;
margin-top:10px;
}

button{
margin-top:20px;
background:#ff9fc4;
border:none;
padding:12px 25px;
border-radius:40px;
font-size:16px;
color:white;
cursor:pointer;
transition:.2s;
}

button:hover{
transform:scale(1.1);
background:#ff7fb2;
}

/* 벚꽃 */

.sakura{
position:fixed;
top:-10px;
font-size:20px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
}
}

/* 토끼 */

.bunny{
position:fixed;
font-size:40px;
pointer-events:none;
}

</style>
</head>

<body>

<div class="card">

<div style="font-size:55px;">🐰🎀</div>

<div class="title">귀염뽀짝 월드</div>

<div class="subtitle">오늘도 행복 MAX 💗</div>

<button onclick="hello()">눌러봐!</button>

</div>

<script>

/* 버튼 */

function hello(){
alert("귀여움 충전 완료 🐰💖");
}

/* 벚꽃 */

function createSakura(){

const sakura=document.createElement("div");
sakura.className="sakura";
sakura.innerHTML="🌸";

sakura.style.left=Math.random()*100+"vw";
sakura.style.animationDuration=(4+Math.random()*4)+"s";
sakura.style.fontSize=(15+Math.random()*20)+"px";

document.body.appendChild(sakura);

setTimeout(()=>sakura.remove(),8000);

}

setInterval(createSakura,250);


/* 토끼 생성 */

function createBunny(){

const bunny=document.createElement("div");
bunny.className="bunny";
bunny.innerHTML="🐰";

document.body.appendChild(bunny);

let x=Math.random()*window.innerWidth;
let y=Math.random()*window.innerHeight;

bunny.style.left=x+"px";
bunny.style.top=y+"px";

function move(){

x+= (Math.random()-0.5)*200;
y+= (Math.random()-0.5)*200;

x=Math.max(0,Math.min(window.innerWidth,x));
y=Math.max(0,Math.min(window.innerHeight,y));

bunny.style.transition="2s linear";
bunny.style.left=x+"px";
bunny.style.top=y+"px";

}

setInterval(move,2000);

}

/* 여러 마리 생성 */

for(let i=0;i<8;i++){
createBunny();
}

</script>

</body>
</html>
