<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>귀염뽀짝 월드</title>

<style>

body{
margin:0;
overflow:hidden;
height:100vh;
background:linear-gradient(180deg,#ffddee,#fff5fa);
}

/* 카드 */

.card{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:40px;
border-radius:30px;
text-align:center;
width:320px;
box-shadow:0 20px 40px rgba(255,150,180,0.3);
z-index:10;
}

/* 토끼 이미지 */

.bunny{
position:fixed;
width:80px;
pointer-events:none;
}

</style>
</head>

<body>

<div class="card">

<h2 style="color:#ff6fa5">귀염뽀짝 월드 🎀</h2>
<p>오늘도 행복한 하루 💗</p>

</div>

<script>

/* 넣고 싶은 사진 목록 */

const bunnyImages = [
"bunny1.png",
"bunny3.png",
"bunny4.png",
"bunny5.png",
"bunny6.png",
"bunny7.png",
"bunny8.png"
];


/* 토끼 생성 */

function createBunny(imgSrc){

const bunny=document.createElement("img");

bunny.className="bunny";

bunny.src=imgSrc;

document.body.appendChild(bunny);

let x=Math.random()*window.innerWidth;
let y=Math.random()*window.innerHeight;

bunny.style.left=x+"px";
bunny.style.top=y+"px";

function move(){

x+= (Math.random()-0.5)*200;
y+= (Math.random()-0.5)*200;

x=Math.max(0,Math.min(window.innerWidth-80,x));
y=Math.max(0,Math.min(window.innerHeight-80,y));

bunny.style.transition="2s linear";
bunny.style.left=x+"px";
bunny.style.top=y+"px";

}

setInterval(move,2000);

}

/* 사진 수만큼 생성 */

bunnyImages.forEach(img=>{
createBunny(img);
});

</script>

</body>
</html>
