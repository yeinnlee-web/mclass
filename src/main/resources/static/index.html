<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>귀염뽀짝 페이지</title>
<style>
body {
    background: linear-gradient(135deg, #ffd6e7, #ffeef5);
    font-family: "Arial", sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.card {
    background: white;
    border-radius: 20px;
    padding: 40px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    width: 300px;
}

.title {
    font-size: 28px;
    color: #ff6fa5;
    margin-bottom: 10px;
}

.subtitle {
    color: #777;
    margin-bottom: 25px;
}

button {
    background: #ff8fb1;
    border: none;
    color: white;
    padding: 12px 20px;
    border-radius: 30px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #ff6fa5;
    transform: scale(1.05);
}

.emoji {
    font-size: 40px;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="card">
    <div class="emoji">🐰💖</div>
    <div class="title">귀염뽀짝!</div>
    <div class="subtitle">오늘도 좋은 하루 보내세요 ✨</div>
    <button onclick="hello()">눌러보세요!</button>
</div>

<script>
function hello(){
    alert("귀여운 하루 되세요! 🐣💕");
}
</script>

</body>
</html>
